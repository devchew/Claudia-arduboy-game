name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install platform & libraries
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli lib update-index
          arduino-cli lib install "Arduboy2"
          arduino-cli lib install "ArduboyTones"

      - name: Compile Sketch
        run: arduino-cli compile --fqbn arduino:avr:leonardo Sketch/Sketch.ino --build-path build

      - name: Upload hex artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudia-hex
          path: build/Sketch.ino.hex