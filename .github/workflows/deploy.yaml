name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install platform & libraries
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli lib update-index
          arduino-cli lib install "Arduboy2"
          arduino-cli lib install "ArduboyTones"

      - name: Compile Sketch
        run: arduino-cli compile --fqbn arduino:avr:leonardo Sketch/Sketch.ino --build-path build

      - name: Prepare site
        run: |
          mkdir -p web/games
          cp build/Sketch.ino.hex web/games/cloudia.hex
          sed -i "s/#__BUILD_NUMBER__#/${{ github.run_number }}/" web/index.html
          sed -i "s/#__BUILD_DATE__#/$(date -u +'%Y-%m-%d %H:%M UTC')/" web/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'web'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4